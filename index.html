<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #start-btn {
            padding: 14px 28px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        #buffer-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 8888;
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }

        .progress-container {
            width: 200px;
            background-color: #333;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 6px;
            background-color: #28a745;
            transition: width 0.1s ease;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

<div id="start-overlay">
    <h2 style="margin-bottom:10px;">MindAR 影片體驗</h2>
    <p style="margin-bottom:20px;color:#ccc;">點擊按鈕開啟相機並載入體驗</p>
    <button id="start-btn">開始 AR</button>
</div>

<div id="buffer-box">
    <span id="status-text">影片載入中...</span>
    <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>
</div>

<a-scene
    id="ar-scene"
    mindar-image="
        imageTargetSrc: ./targets.mind;
        autoStart: false;
        filterMinCF: 0.001;
        filterBeta: 0.01;
        missTolerance: 10;
        warmupTolerance: 10"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="20000">
        <video 
            id="videoTarget" 
            src="./1.mp4" 
            loop="true" 
            playsinline 
            webkit-playsinline 
            muted
            crossorigin="anonymous">
        </video>
        <img id="welcomeTextImg" src="https://placehold.co/512x128/000000/ffffff/png?text=Welcome+to+City+of+Dreams">
    </a-assets>

    <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
    <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false">
        <a-cursor 
            id="cursor"
            animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
            animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
            raycaster="objects: .clickable">
        </a-cursor>
    </a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        
        <a-video
            id="main-video"
            src="#videoTarget"
            width="1"
            height="0.5625"
            position="0 0 0"
            rotation="0 0 0">
        </a-video>

        <a-curvedimage 
            src="#welcomeTextImg" 
            radius="0.8" 
            theta-length="60" 
            theta-start="150"
            height="0.2" 
            position="0 0.45 -0.2"
            rotation="0 0 0">
        </a-curvedimage>

        <a-entity 
            id="click-btn"
            class="clickable"
            position="0 -0.4 0.05"
            geometry="primitive: plane; width: 0.8; height: 0.15"
            material="color: #ff2442; opacity: 0.9; shader: flat">
            
            <a-text 
                value="點擊進入 Go to Xiaohongshu" 
                align="center" 
                color="#ffffff" 
                width="1.5"
                position="0 0 0.01">
            </a-text>
        </a-entity>

    </a-entity>

</a-scene>

<script>
const sceneEl = document.querySelector("#ar-scene");
const startBtn = document.querySelector("#start-btn");
const startOverlay = document.querySelector("#start-overlay");
const arTarget = document.querySelector("#ar-target");
const videoEl = document.querySelector("#videoTarget");

const bufferBox = document.querySelector("#buffer-box");
const statusText = document.querySelector("#status-text");
const progressBar = document.querySelector("#progress-bar");
const clickBtn = document.querySelector("#click-btn");

let hasUserInteracted = false;

// 監聽影片下載進度條
videoEl.addEventListener("progress", () => {
    if (videoEl.buffered.length > 0) {
        const duration = videoEl.duration;
        const bufferedEnd = videoEl.buffered.end(videoEl.buffered.length - 1);
        if (duration > 0) {
            const percent = (bufferedEnd / duration) * 100;
            progressBar.style.width = `${percent}%`;
            statusText.innerText = `影片緩衝中: ${Math.round(percent)}%`;
            if (percent >= 95 && bufferBox.style.display !== "none") {
                setTimeout(() => { bufferBox.style.display = "none"; }, 1000);
            }
        }
    }
});

// 開始 AR 按鈕點擊事件
startBtn.addEventListener("click", () => {
    startOverlay.classList.add("hidden");
    hasUserInteracted = true;

    // 預熱影片防黑屏
    videoEl.load();
    videoEl.play().then(() => {
        videoEl.pause(); 
    }).catch(err => console.log("Muted pre-play init"));

    // 啟動 AR
    const tryStart = () => {
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        if (mindarSystem) {
            console.log("Start MindAR");
            mindarSystem.start();
        } else {
            console.log("Waiting MindAR...");
            setTimeout(tryStart, 300);
        }
    };

    tryStart();
});

// 偵測到圖卡
arTarget.addEventListener("targetFound", () => {
    console.log("找到圖卡");
    if (videoEl.readyState < 4) {
        bufferBox.style.display = "flex";
    }

    videoEl.muted = false;
    videoEl.play().catch(err => {
        videoEl.muted = true;
        videoEl.play();
    });
});

// 圖卡遺失
arTarget.addEventListener("targetLost", () => {
    console.log("圖卡遺失");
    videoEl.pause();
    bufferBox.style.display = "none";
});

// 修正後的底部紅框點擊跳轉邏輯
clickBtn.addEventListener("click", () => {
    console.log("成功觸發點擊，正在跳轉至小紅書...");
    // 採用當前頁面重定向，避開移動端瀏覽器彈窗攔截
    window.location.href = "https://www.xiaohongshu.com/explore?channel_id=homefeed_recommend";
});
</script>

</body>
</html>
