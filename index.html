<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
        <a-assets>
            <a-asset-item id="obj-model" src="./1.obj"></a-asset-item>
            
            </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-obj-model id="ar-model"
                         src="#obj-model"
                         /* mtl="#obj-mtl" 如果有材質檔，請取消此行註解 */
                         position="0 0 0" 
                         rotation="90 0 0" 
                         scale="0.1 0.1 0.1">
            </a-obj-model>
        </a-entity>
    </a-scene>

    <script>
        const targetEntity = document.querySelector('#ar-target');

        // 如果後續需要針對「識別成功/失敗」做額外的邏輯處理（例如音效或事件統計），可以保留這段監聽
        targetEntity.addEventListener("targetFound", event => {
            console.log("識別成功，模型已顯示");
        });

        targetEntity.addEventListener("targetLost", event => {
            console.log("失去識別");
        });
    </script>
</body>
</html>
