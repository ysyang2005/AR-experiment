<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        /* 提示用戶點擊的遮罩（可選，用來應對 iOS 的嚴格限制） */
        #click-prompt {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

    <div id="click-prompt">識別成功！請點擊螢幕解鎖視頻</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights; alpha: true; precision: mediump;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
        <a-assets>
            <video id="vid" 
                   src="./1.mp4" 
                   preload="auto" 
                   loop="true" 
                   muted="true" 
                   playsinline
                   webkit-playsinline
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-mesh id="ar-video" 
                    geometry="primitive: plane; width: 1; height: 1;"
                    material="src: #vid; transparent: true; blending: screen; side: double; depthWrite: false;"
                    position="0 0 0.01" 
                    rotation="0 0 0">
            </a-mesh>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#vid');
        const arVideo = document.querySelector('#ar-video');
        const targetEntity = document.querySelector('#ar-target');
        const prompt = document.querySelector('#click-prompt');

        // 適應視頻比例，防止變形
        function resizeVideo() {
            if (video.videoWidth > 0 && video.videoHeight > 0) {
                const aspect = video.videoWidth / video.videoHeight;
                if (aspect >= 1) {
                    arVideo.setAttribute('geometry', { primitive: 'plane', width: 1, height: 1 / aspect });
                } else {
                    arVideo.setAttribute('geometry', { primitive: 'plane', height: 1, width: aspect });
                }
            }
        }

        // 當視頻元數據加載好時更新尺寸
        video.addEventListener('loadedmetadata', resizeVideo);

        // 核心改動 3：終極手勢與解鎖邏輯
        function playAndRefresh() {
            video.muted = true;
            
            // 強制重新將視頻源丟給 WebGL 材質，打破「透明隱身」的 Bug
            if (arVideo.getObject3D('mesh')) {
                const material = arVideo.getObject3D('mesh').material;
                if (material && !material.map) {
                    material.map = new THREE.VideoTexture(video);
                }
                material.needsUpdate = true;
            }

            video.play().then(() => {
                console.log("視頻成功播放");
                prompt.style.display = 'none';
                resizeVideo();
            }).catch((err) => {
                console.log("被瀏覽器攔截，顯示提示讓用戶點擊", err);
                prompt.style.display = 'block';
            });
        }

        // 監聽識別事件
        targetEntity.addEventListener("targetFound", event => {
            console.log("識別到物體");
            playAndRefresh();
        });

        targetEntity.addEventListener("targetLost", event => {
            console.log("失去識別");
            video.pause();
            prompt.style.display = 'none';
        });

        // 全局點擊解鎖事件（針對 iOS Safari 終極防禦）
        const handleUserClick = () => {
            if (!video.paused) return; // 如果已經在播了就不管它
            
            // 只有當識別到了才在點擊時觸發播放
            const arSystem = document.querySelector('a-scene').systems['mindar-image-system'];
            // 檢查當前是否有目標被追蹤到
            video.play().then(() => {
                prompt.style.display = 'none';
                resizeVideo();
            }).catch(e => console.log(e));
        };

        document.body.addEventListener('click', handleUserClick);
        document.body.addEventListener('touchstart', handleUserClick);
    </script>
</body>
</html>
