<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Image Experience</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 初始遮罩層 */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
        }

        #start-btn, .game-btn {
            padding: 14px 28px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        #start-btn:active, .game-btn:active {
            background: #0056b3;
        }

        /* 故事劇情面板 */
        #story-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 25px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-top: 2px solid #333;
        }

        .story-text {
            font-size: 18px;
            line-height: 1.6;
            min-height: 50px;
        }

        .btn-wrapper {
            display: flex;
            justify-content: flex-end;
        }

        /* 通用隱藏樣式 */
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

<div id="start-overlay">
    <h2 style="margin-bottom:10px;">MindAR 互動體驗</h2>
    <p style="margin-bottom:25px;color:#ccc;">點擊按鈕開始進入故事</p>
    <button id="start-btn">進入遊戲</button>
</div>

<a-scene
    id="ar-scene"
    mindar-image="
        imageTargetSrc: ./targets.mind;
        autoStart: false;
        filterMinCF: 0.001;
        filterBeta: 0.01;
        missTolerance: 10;
        warmupTolerance: 10"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="10000">
        <video 
            id="videoTarget" 
            src="./1.mp4" 
            preload="auto" 
            crossorigin="anonymous" 
            loop="true" 
            playsinline 
            webkit-playsinline>
        </video>
    </a-assets>

    <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
    <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video
            src="#videoTarget"
            width="1"
            height="0.5625"
            position="0 0 0"
            rotation="0 0 0">
        </a-video>
    </a-entity>
</a-scene>

<div id="story-container" class="hidden">
    <div id="dialogue-box" class="story-text">正在載入故事...</div>
    <div class="btn-wrapper">
        <button id="next-btn" class="game-btn hidden">下一步 ▼</button>
    </div>
</div>

<script>
// DOM 元素優化獲取
const sceneEl = document.querySelector("#ar-scene");
const arTargetEl = document.querySelector("#ar-target");
const startBtn = document.querySelector("#start-btn");
const nextBtn = document.querySelector("#next-btn");
const startOverlay = document.querySelector("#start-overlay");
const storyContainer = document.querySelector("#story-container");
const dialogueBox = document.querySelector("#dialogue-box");
// 獲取視訊 DOM 元素
const videoEl = document.querySelector("#videoTarget");

let sceneReady = false;
let currentStep = 0; 

// 劇本與狀態控制陣列
const scriptStages = [
    { text: "（前情提要）你在桌上發現了一張神祕的舊相片，上面似乎隱藏著某種符號...", isARRequired: false },
    { text: "【任務】請開啟相機，對準桌上的相片進行掃描以讀取信物資訊。", isARRequired: true },
    { text: "（成功識別！）相片上浮現出了當年的影像。原來這封信是留給你的...", isARRequired: false },
    { text: "故事未完待續，感謝體驗！", isARRequired: false }
];

// 監聽 A-Frame 場景載入
sceneEl.addEventListener("loaded", () => {
    sceneReady = true;
    console.log("Scene Loaded");
});

// 1. 點擊「進入遊戲」按鈕
startBtn.addEventListener("click", () => {
    startOverlay.classList.add("hidden");
    storyContainer.classList.remove("hidden"); // 顯示劇情面板
    renderStage();
});

// 2. 核心：引導與渲染當前劇情/AR 狀態
function renderStage() {
    const stage = scriptStages[currentStep];
    dialogueBox.innerText = stage.text;
    
    // 每次切換先隱藏下一步按鈕，由邏輯控制何時出現
    nextBtn.classList.add("hidden");

    if (stage.isARRequired) {
        // 如果這個階段需要 AR 掃描，則啟動相機
        startCamera();
    } else {
        // 如果只是一般劇情，直接顯示「下一步」按鈕讓玩家點擊
        nextBtn.classList.remove("hidden");
    }
}

// 3. 啟動 MindAR 相機
function startCamera() {
    const tryStart = () => {
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        if (mindarSystem) {
            console.log("Start MindAR Camera");
            mindarSystem.start();
        } else {
            setTimeout(tryStart, 300);
        }
    };

    if (sceneReady) {
        tryStart();
    } else {
        sceneEl.addEventListener("loaded", tryStart, { once: true });
    }
}

// 4. 關閉 MindAR 相機（節省效能與耗電）
function stopCamera() {
    const mindarSystem = sceneEl.systems["mindar-image-system"];
    if (mindarSystem) {
        console.log("Stop MindAR Camera");
        mindarSystem.stop();
    }
}

// 5. 監聽 MindAR 「識別成功」事件
arTargetEl.addEventListener("targetFound", () => {
    console.log("Target Found!");
    
    // 識別成功時，自動播放視訊
    if (videoEl) {
        videoEl.play().catch((err) => {
            console.log("視訊播放被瀏覽器攔截，嘗試靜音播放:", err);
            videoEl.muted = true; // 如果因為音訊權限被攔截，則靜音播放
            videoEl.play();
        });
    }
    
    // 只有在處於「需要 AR」的劇情步驟時，識別成功才會觸發下一步
    if (scriptStages[currentStep].isARRequired) {
        nextBtn.classList.remove("hidden");
    }
});

// 監聽 MindAR 「目標丟失」事件（可選：離開目標時暫停視訊）
arTargetEl.addEventListener("targetLost", () => {
    console.log("Target Lost");
    if (videoEl) {
        videoEl.pause();
    }
});

// 6. 點擊「下一步」按鈕的通用邏輯
nextBtn.addEventListener("click", () => {
    // 如果剛才是在 AR 掃描狀態，點擊下一步代表要「結束 AR 檢視」回到純劇情了
    if (scriptStages[currentStep].isARRequired) {
        if (videoEl) {
            videoEl.pause(); // 停止視訊播放
        }
        stopCamera();
    }

    currentStep++;
    
    if (currentStep < scriptStages.length) {
        renderStage();
    } else {
        dialogueBox.innerText = "體驗已結束。";
        nextBtn.classList.add("hidden");
    }
});
</script>

</body>
</html>
