<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #start-btn {
            padding: 14px 28px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        /* 新增：按鈕停用時的樣式 */
        #start-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        /* 新增：進度條的外框容器 */
        .progress-container {
            width: 240px;
            background-color: #333;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
            display: none; /* 觸發下載時才顯示 */
        }

        /* 新增：進度條本體 */
        .progress-bar {
            width: 0%;
            height: 8px;
            background-color: #28a745;
            transition: width 0.1s ease;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

<div id="start-overlay">
    <h2 style="margin-bottom:10px;">MindAR 影片體驗</h2>
    <p id="status-text" style="margin-bottom:15px;color:#ccc;">正在準備資源...</p>
    
    <div id="progress-container" class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>

    <button id="start-btn" disabled>請稍候...</button>
</div>

<a-scene
    id="ar-scene"
    mindar-image="
        imageTargetSrc: ./targets.mind;
        autoStart: false;
        filterMinCF: 0.001;
        filterBeta: 0.01;
        missTolerance: 10;
        warmupTolerance: 10"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="15000">
        <video 
            id="videoTarget" 
            src="./1.mp4" 
            preload="auto" 
            loop="true" 
            class="intersectable" 
            playsinline 
            webkit-playsinline 
            crossorigin="anonymous">
        </video>
    </a-assets>

    <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
    <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video
            src="#videoTarget"
            width="1"
            height="0.5625"
            position="0 0 0"
            rotation="0 0 0">
        </a-video>
    </a-entity>

</a-scene>

<script>
const sceneEl = document.querySelector("#ar-scene");
const startBtn = document.querySelector("#start-btn");
const startOverlay = document.querySelector("#start-overlay");
const arTarget = document.querySelector("#ar-target");
const videoEl = document.querySelector("#videoTarget");

// 新增：獲取進度條相關 DOM
const statusText = document.querySelector("#status-text");
const progressContainer = document.querySelector("#progress-container");
const progressBar = document.querySelector("#progress-bar");

let sceneReady = false;
let videoReady = false;

// 檢查是否兩者都準備好
const checkReady = () => {
    if (sceneReady && videoReady) {
        statusText.innerText = "資源準備就緒！";
        startBtn.innerText = "開始 AR";
        startBtn.disabled = false;
    }
};

sceneEl.addEventListener("loaded", () => {
    sceneReady = true;
    console.log("Scene Loaded");
    checkReady();
});

// 新增：監聽影片原生緩衝進度 (HTML5 Video progress event)
videoEl.addEventListener("progress", () => {
    progressContainer.style.display = "block";
    if (videoEl.buffered.length > 0) {
        const duration = videoEl.duration;
        const bufferedEnd = videoEl.buffered.end(videoEl.buffered.length - 1);
        
        if (duration > 0) {
            const percent = (bufferedEnd / duration) * 100;
            progressBar.style.width = `${percent}%`;
            statusText.innerText = `影片緩衝中: ${Math.round(percent)}%`;
            
            // 當下載進度大於 85% 時，通常足以流暢播放，解除鎖定
            if (percent >= 85) {
                videoReady = true;
                checkReady();
            }
        }
    }
});

// 新增：當瀏覽器認為可以流暢播放時觸發
videoEl.addEventListener("canplaythrough", () => {
    videoReady = true;
    progressBar.style.width = "100%";
    checkReady();
});


startBtn.addEventListener("click", () => {
    startOverlay.classList.add("hidden");

    // 核心修改：點擊時「只預熱播放並解除靜音」，不要立刻下暫停(pause)命令，這樣能防止黑屏
    // 讓影片在背景靜靜播放，直到偵測到圖卡
    videoEl.play().then(() => {
        videoEl.muted = false; 
    }).catch(err => {
        console.log("Video init error, retry with muted:", err);
        videoEl.muted = true; // 如果被部分嚴格瀏覽器阻擋，降級為靜音播放
        videoEl.play();
    });

    const tryStart = () => {
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        if (mindarSystem) {
            console.log("Start MindAR");
            mindarSystem.start();
        } else {
            console.log("Waiting MindAR...");
            setTimeout(tryStart, 300);
        }
    };

    tryStart();
});

// 偵測圖卡，自動開關影片
arTarget.addEventListener("targetFound", () => {
    console.log("找到圖卡，播放影片");
    videoEl.play();
});

arTarget.addEventListener("targetLost", () => {
    console.log("圖卡遺失，暫停影片");
    videoEl.pause();
});
</script>

</body>
</html>
