<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #start-btn {
            padding: 14px 28px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

<div id="start-overlay">
    <h2 style="margin-bottom:10px;">MindAR 影片體驗</h2>
    <p style="margin-bottom:25px;color:#ccc;">
        點擊按鈕開始 AR
    </p>
    <button id="start-btn">開始 AR</button>
</div>

<a-scene
    id="ar-scene"
    mindar-image="
        imageTargetSrc: ./targets.mind;
        autoStart: false;
        filterMinCF: 0.001;
        filterBeta: 0.01;
        missTolerance: 10;
        warmupTolerance: 10"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- 1. 【修改部分】資源載入改為 video，並預先靜音以符合瀏覽器規範 -->
    <a-assets timeout="10000">
        <video 
            id="videoTarget" 
            src="./1.mp4" 
            preload="auto" 
            loop="true" 
            class="intersectable" 
            playsinline 
            webkit-playsinline 
            muted
            crossorigin="anonymous">
        </video>
    </a-assets>

    <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
    <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- 2. 【修改部分】將 a-image 改為 a-video -->
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video
            src="#videoTarget"
            width="1"
            height="0.5625"
            position="0 0 0"
            rotation="0 0 0">
        </a-video>
    </a-entity>

</a-scene>

<script>
const sceneEl = document.querySelector("#ar-scene");
const startBtn = document.querySelector("#start-btn");
const startOverlay = document.querySelector("#start-overlay");
const arTarget = document.querySelector("#ar-target");
const videoEl = document.querySelector("#videoTarget");

let sceneReady = false;

sceneEl.addEventListener("loaded", () => {
    sceneReady = true;
    console.log("Scene Loaded");
});

startBtn.addEventListener("click", () => {
    startOverlay.classList.add("hidden");

    // 瀏覽器要求必須有使用者互動（點擊）才能觸發影片播放與解鎖音量
    videoEl.play().then(() => {
        videoEl.pause(); // 先播放再暫停，用以啟用影片載入
        videoEl.muted = false; // 解除靜音（若希望影片有聲音）
    }).catch(err => console.log("Video init error:", err));

    const tryStart = () => {
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        if (mindarSystem) {
            console.log("Start MindAR");
            mindarSystem.start();
        } else {
            console.log("Waiting MindAR...");
            setTimeout(tryStart, 300);
        }
    };

    if (sceneReady) {
        tryStart();
    } else {
        sceneEl.addEventListener("loaded", tryStart, { once: true });
    }
});

// 3. 【新增部分】偵測圖卡，自動開關影片
arTarget.addEventListener("targetFound", () => {
    console.log("找到圖卡，播放影片");
    videoEl.play();
});

arTarget.addEventListener("targetLost", () => {
    console.log("圖卡遺失，暫停影片");
    videoEl.pause();
});
</script>

</body>
</html>
