<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>時空信物 - 戀愛巷之謎</title>

    <!-- 載入 A-Frame 與 MindAR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root {
            --bg-dark: #0a0a0c;
            --pink-love: #df6c85;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            /* 定義 AR 區域的高度，剩下的會留給對話框 */
            --ar-height: 55vh; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-dark); font-family: -apple-system, sans-serif; }

        #game-container {
            width: 100%; height: 100%; height: -webkit-fill-available;
            background: url('bg_love_lane.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding-top: var(--safe-top);
            position: relative;
            z-index: 10;
        }

        /* --- AR 容器：強制將相機與渲染畫面限縮在上半部分 --- */
        .ar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--ar-height);
            overflow: hidden;
            display: none; /* 預設隱藏，走到 AR 劇情才開啟 */
            background: #000;
        }

        /* 強制蓋過 MindAR/A-Frame 的全螢幕樣式 */
        .ar-container a-scene,
        .ar-container canvas,
        .ar-container video {
            width: 100% !important;
            height: var(--ar-height) !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            object-fit: cover !important;
        }

        /* 掃描提示框框（可選） */
        .ar-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-25%, -50%);
            width: 50%; height: 50%;
            border: 2px dashed rgba(223, 108, 133, 0.6);
            border-radius: 10px;
            pointer-events: none;
            z-index: 99;
            display: none;
        }

        /* 視覺小說置底面板 */
        .vn-panel {
            width: 100%;
            background: linear-gradient(to top, rgba(10,10,12,0.95) 80%, rgba(10,10,12,0));
            padding: 40px 20px calc(20px + var(--safe-bottom)) 20px;
            cursor: pointer;
            z-index: 20;
        }

        .name-box { color: var(--pink-love); font-weight: bold; border-bottom: 2px solid var(--pink-love); display: inline-block; margin-bottom: 15px; font-size: 16px; }
        .text-box { font-size: 18px; line-height: 1.6; color: #e0e0e6; min-height: 60px; }
        .click-hint { text-align: right; font-size: 11px; color: rgba(223, 183, 108, 0.5); margin-top: 15px; opacity: 0.6; }
    </style>
</head>
<body>

<!-- AR 視訊區域（包在一個自訂容器內） -->
<div id="ar-wrapper" class="ar-container">
    <div id="scan-guide" class="ar-overlay"></div>
    
    <a-scene
        id="ar-scene"
        mindar-image="
            imageTargetSrc: ./targets.mind;
            autoStart: false;
            filterMinCF: 0.001;
            filterBeta: 0.01;
            missTolerance: 10;
            warmupTolerance: 10"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets timeout="10000">
            <!-- 這裡放你掃描成功後想顯現的意外收穫（例如一張驚喜圖片或特效） -->
            <img id="surpriseImage" src="./1.jpg" crossorigin="anonymous">
        </a-assets>

        <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 假設 owl_target 是你在 targets.mind 裡面打包的第一個目標物（貓頭鷹） -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-image
                src="#surpriseImage"
                width="1"
                height="1"
                position="0 0 0">
            </a-image>
        </a-entity>
    </a-scene>
</div>

<!-- 遊戲主要 UI -->
<div id="game-container">
    <div class="vn-panel" onclick="nextPage()">
        <div id="name-box" class="name-box">艾蓮娜</div>
        <div id="dialogue" class="text-box"></div>
        <div id="click-hint" class="click-hint">▼ 點擊繼續</div>
    </div>
</div>

<script>
    // 劇情台詞陣列，第三頁植入 AR 掃描需求
    const storyNodes = [
        { name: "艾蓮娜", text: "這裡為什麼叫戀愛巷？" },
        { name: "主角", text: "傳說中是因為..." },
        { name: "系統", text: "請掃描門口的貓頭鷹，看看有什麼意外收穫。", isARPage: true }
    ];

    let currentIndex = 0;
    let isTyping = false;
    let typeTimer = null;
    let sceneReady = false;

    const dialogueBox = document.getElementById('dialogue');
    const nameBox = document.getElementById('name-box');
    const arWrapper = document.getElementById('ar-wrapper');
    const scanGuide = document.getElementById('scan-guide');
    const sceneEl = document.querySelector("#ar-scene");
    const clickHint = document.getElementById('click-hint');

    // 監聽 AR 場景載入
    sceneEl.addEventListener("loaded", () => {
        sceneReady = true;
        console.log("AR Scene Loaded");
    });

    function drawText(node) {
        isTyping = true;
        nameBox.innerText = node.name;
        dialogueBox.innerHTML = "";
        let i = 0;
        clearInterval(typeTimer);
        
        // 如果是 AR 頁面，觸發相機開啟機制
        if (node.isARPage) {
            setupARView();
        } else {
            // 非 AR 頁面則隱藏相機與背景
            arWrapper.style.display = 'none';
            scanGuide.style.display = 'none';
            clickHint.style.display = 'block';
        }

        typeTimer = setInterval(() => {
            if (i < node.text.length) {
                dialogueBox.innerHTML += node.text.charAt(i);
                i++;
            } else {
                clearInterval(typeTimer);
                isTyping = false;
            }
        }, 80);
    }

    // 啟動 AR 畫面並重新定位
    function setupARView() {
        // 顯示上半部的 AR 容器
        arWrapper.style.display = 'block';
        scanGuide.style.display = 'block';
        
        // 在 AR 掃描階段，可以隱藏「點擊繼續」提示，引導使用者去掃描
        clickHint.style.display = 'none'; 

        const tryStartAR = () => {
            const mindarSystem = sceneEl.systems["mindar-image-system"];
            if (mindarSystem) {
                console.log("Start MindAR Camera");
                mindarSystem.start();
            } else {
                setTimeout(tryStartAR, 300);
            }
        };

        if (sceneReady) {
            tryStartAR();
        } else {
            sceneEl.addEventListener("loaded", tryStartAR, { once: true });
        }
    }

    function nextPage() {
        // 如果是 AR 頁面，且你希望使用者「一定要掃描成功才能前進」，可以在這裡鎖死點擊
        if (storyNodes[currentIndex].isARPage && !isTyping) {
            console.log("當前為 AR 掃描任務，請對準貓頭鷹目標。");
            // 如果你想允許使用者跳過，就把下面這行 return 註解掉
            return; 
        }

        if (isTyping) {
            clearInterval(typeTimer);
            dialogueBox.innerHTML = storyNodes[currentIndex].text;
            isTyping = false;
        } else {
            currentIndex++;
            if (currentIndex < storyNodes.length) {
                drawText(storyNodes[currentIndex]);
            } else {
                alert("劇情繼續展開中...");
            }
        }
    }

    // 監聽 MindAR 成功識別目標物的事件
    sceneEl.addEventListener("targetFound", event => {
        console.log("找到貓頭鷹了！");
        // 可以在這裡解鎖下一頁，或者自動跳到下一段劇情
        // clickHint.style.display = 'block'; 
    });

    // 初始化
    window.onload = () => drawText(storyNodes[0]);
</script>
</body>
</html>
