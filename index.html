<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
    </style>

    <script>
        // 註冊過濾黑底的著色器
        AFRAME.registerShader('chromakey-black', {
            schema: {
                src: {type: 'map'},
                threshold: {type: 'number', default: 0.15}
            },
            init: function(data) {
                this.material = new THREE.MeshBasicMaterial({
                    transparent: true,
                    side: THREE.DoubleSide
                });
                return this.material;
            },
            update: function(data) {
                this.material.map = data.src;
            },
            tick: function() {
                // 每幀強制更新紋理，防止移動端畫面卡死或透明
                if (this.material.map && this.material.map.image) {
                    this.material.map.needsUpdate = true;
                }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D src;
                uniform float threshold;
                varying vec2 vUv;
                void main() {
                    vec4 texColor = texture2D(src, vUv);
                    float brightness = (texColor.r + texColor.g + texColor.b) / 3.0;
                    if (brightness < threshold) {
                        gl_FragColor = vec4(texColor.rgb, 0.0);
                    } else {
                        gl_FragColor = texColor;
                    }
                }
            `
        });
    </script>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights; alpha: true;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
        <a-assets>
            <video id="vid" 
                   src="./1.mp4" 
                   type="video/mp4"
                   preload="auto" 
                   loop="true" 
                   muted="true" 
                   playsinline
                   webkit-playsinline
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-mesh id="ar-video" 
                    geometry="primitive: plane; width: 1; height: 1;"
                    material="shader: chromakey-black; src: #vid; threshold: 0.15;"
                    position="0 0 0.01" 
                    rotation="0 0 0">
            </a-mesh>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#vid');
        const arVideo = document.querySelector('#ar-video');
        const targetEntity = document.querySelector('#ar-target');

        // 自動適應寬高比
        function resizeVideo() {
            if (video.videoWidth > 0 && video.videoHeight > 0) {
                const aspect = video.videoWidth / video.videoHeight;
                if (aspect >= 1) {
                    arVideo.setAttribute('geometry', { primitive: 'plane', width: 1, height: 1 / aspect });
                } else {
                    arVideo.setAttribute('geometry', { primitive: 'plane', height: 1, width: aspect });
                }
                console.log("視頻尺寸已適應:", video.videoWidth, "x", video.videoHeight);
            }
        }

        video.addEventListener('loadedmetadata', resizeVideo);

        // 核心改動 3：初始化預加載機制
        // 在頁面加載時先靜音播放 0.1 秒然後暫停，這能強制讓瀏覽器和 WebGL 完成視頻紋理的握手
        window.addEventListener('load', () => {
            video.play().then(() => {
                video.pause();
                console.log("WebGL 視頻紋理預加載成功");
            }).catch((e) => {
                console.log("初始預加載受阻（正常現象），等待識別後觸發", e);
            });
        });

        // 強制播放控制
        const startPlayback = () => {
            video.muted = true;
            resizeVideo();
            
            video.play().then(() => {
                console.log("視頻成功播放並渲染");
            }).catch((err) => {
                console.log("被瀏覽器攔截，添加手勢解鎖");
                
                // 終極手勢解鎖
                const unlock = () => {
                    video.play().then(() => resizeVideo());
                    document.body.removeEventListener('click', unlock);
                    document.body.removeEventListener('touchstart', unlock);
                };
                document.body.addEventListener('click', unlock);
                document.body.addEventListener('touchstart', unlock);
            });
        };
        
        // 監聽識別事件
        targetEntity.addEventListener("targetFound", event => {
            console.log("識別成功，開始引導播放");
            startPlayback();
        });

        targetEntity.addEventListener("targetLost", event => {
            console.log("失去識別，暫停");
            video.pause();
        });
    </script>
</body>
</html>
