<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #start-btn {
            padding: 14px 28px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        /* 影片緩衝提示（預設隱藏） */
        #buffer-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 8888;
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .progress-container {
            width: 200px;
            background-color: #333;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 6px;
            background-color: #28a745;
            transition: width 0.1s ease;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

<div id="start-overlay">
    <h2 style="margin-bottom:10px;">MindAR 影片體驗</h2>
    <p style="margin-bottom:20px;color:#ccc;">點擊按鈕開啟相機並載入體驗</p>
    <button id="start-btn">開始 AR</button>
</div>

<div id="buffer-box">
    <span id="status-text">影片載入中...</span>
    <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>
</div>

<a-scene
    id="ar-scene"
    mindar-image="
        imageTargetSrc: ./targets.mind;
        autoStart: false;
        filterMinCF: 0.001;
        filterBeta: 0.01;
        missTolerance: 10;
        warmupTolerance: 10"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="20000">
        <video 
            id="videoTarget" 
            src="./1.mp4" 
            preload="auto" 
            loop="true" 
            class="intersectable" 
            playsinline 
            webkit-playsinline 
            crossorigin="anonymous">
        </video>
    </a-assets>

    <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
    <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video
            src="#videoTarget"
            width="1"
            height="0.5625"
            position="0 0 0"
            rotation="0 0 0">
        </a-video>
    </a-entity>

</a-scene>

<script>
const sceneEl = document.querySelector("#ar-scene");
const startBtn = document.querySelector("#start-btn");
const startOverlay = document.querySelector("#start-overlay");
const arTarget = document.querySelector("#ar-target");
const videoEl = document.querySelector("#videoTarget");

// 進度條 DOM
const bufferBox = document.querySelector("#buffer-box");
const statusText = document.querySelector("#status-text");
const progressBar = document.querySelector("#progress-bar");

let isVideoLoaded = false;

// 監聽影片緩衝進度
videoEl.addEventListener("progress", () => {
    if (videoEl.buffered.length > 0) {
        const duration = videoEl.duration;
        const bufferedEnd = videoEl.buffered.end(videoEl.buffered.length - 1);
        
        if (duration > 0) {
            const percent = (bufferedEnd / duration) * 100;
            progressBar.style.width = `${percent}%`;
            statusText.innerText = `影片下載中: ${Math.round(percent)}%`;
            
            if (percent >= 95) {
                isVideoLoaded = true;
                hideBufferUI();
            }
        }
    }
});

// 影片完全可以流暢播放時
videoEl.addEventListener("canplaythrough", () => {
    isVideoLoaded = true;
    hideBufferUI();
});

function hideBufferUI() {
    progressBar.style.width = "100%";
    statusText.innerText = "影片準備就緒！";
    setTimeout(() => {
        if(isVideoLoaded) bufferBox.style.display = "none";
    }, 1500);
}

// 使用者點擊「開始 AR」
startBtn.addEventListener("click", () => {
    // 1. 隱藏大遮罩
    startOverlay.classList.add("hidden");

    // 2. 如果影片還沒好，在畫面下方默默顯示小進度條，不干擾相機開啟
    if (!isVideoLoaded) {
        bufferBox.style.display = "flex";
    }

    // 3. 【最核心】利用這次點擊手勢，立刻向瀏覽器申請強行載入並播放
    // 許多手機瀏覽器規定：沒有這一步，影片的 progress 事件永遠不會觸發（進度永遠是 0）
    videoEl.load(); 
    videoEl.play().then(() => {
        // 成功播放後，先讓它在背景跑
        videoEl.muted = false;
    }).catch(err => {
        console.log("嘗試解鎖音訊失敗，退回靜音播放機制:", err);
        videoEl.muted = true;
        videoEl.play();
    });

    // 4. 啟動 AR 相機系統
    const tryStart = () => {
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        if (mindarSystem) {
            console.log("Start MindAR");
            mindarSystem.start();
        } else {
            console.log("Waiting MindAR...");
            setTimeout(tryStart, 300);
        }
    };

    tryStart();
});

// 偵測圖卡邏輯
arTarget.addEventListener("targetFound", () => {
    console.log("找到圖卡");
    // 確保找到圖卡時，如果剛好加載完，就直接放出來
    videoEl.play();
});

arTarget.addEventListener("targetLost", () => {
    console.log("圖卡遺失");
    videoEl.pause();
});
</script>

</body>
</html>
