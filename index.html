<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Image Experience</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #start-btn {
            padding: 14px 28px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

<div id="start-overlay">
    <h2 style="margin-bottom:10px;">MindAR 圖片體驗</h2>
    <p style="margin-bottom:25px;color:#ccc;">
        點擊按鈕開始 AR
    </p>
    <button id="start-btn">開始 AR</button>
</div>

<a-scene
    id="ar-scene"
    mindar-image="
        imageTargetSrc: ./targets.mind;
        autoStart: false;
        filterMinCF: 0.001;
        filterBeta: 0.01;
        missTolerance: 10;
        warmupTolerance: 10"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="10000">
        <img
            id="imageTarget"
            src="./1.jpg"
            crossorigin="anonymous">
    </a-assets>

    <a-light
        type="ambient"
        intensity="3"
        color="#ffffff">
    </a-light>

    <a-light
        type="directional"
        intensity="2"
        position="0 5 0"
        color="#ffffff">
    </a-light>

    <a-camera
        position="0 0 0"
        look-controls="enabled: false">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

        <a-image
            src="#imageTarget"
            width="1"
            height="0.5625"
            position="0 0 0"
            rotation="0 0 0">
        </a-image>

    </a-entity>

</a-scene>

<script>
const sceneEl = document.querySelector("#ar-scene");
const startBtn = document.querySelector("#start-btn");
const startOverlay = document.querySelector("#start-overlay");

let sceneReady = false;

sceneEl.addEventListener("loaded", () => {
    sceneReady = true;
    console.log("Scene Loaded");
});

startBtn.addEventListener("click", () => {

    startOverlay.classList.add("hidden");

    const tryStart = () => {

        const mindarSystem = sceneEl.systems["mindar-image-system"];

        if (mindarSystem) {
            console.log("Start MindAR");
            mindarSystem.start();
        } else {
            console.log("Waiting MindAR...");
            setTimeout(tryStart, 300);
        }

    };

    if (sceneReady) {
        tryStart();
    } else {
        sceneEl.addEventListener("loaded", tryStart, { once: true });
    }

});
</script>

</body>
</html>
