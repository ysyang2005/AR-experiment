<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
        <a-assets>
            <video id="vid" 
                   src="./1.mov" 
                   preload="auto" 
                   loop="true" 
                   muted="true" 
                   autoplay="true"
                   crossorigin="anonymous" 
                   webkit-playsinline 
                   playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0" scale="1 1 1">
            <a-video id="ar-video" 
                     src="#vid" 
                     position="0 0 0.01" 
                     rotation="0 0 0"
                     width="1" 
                     height="1">
            </a-video>
        </a-entity>
    </scene>

    <script>
        const video = document.querySelector('#vid');
        const arVideo = document.querySelector('#ar-video');

        // 自動適應影片寬高比，防止壓扁
        video.addEventListener('loadedmetadata', function() {
            const aspect = video.videoWidth / video.videoHeight;
            if (aspect >= 1) {
                arVideo.setAttribute('width', '1');
                arVideo.setAttribute('height', (1 / aspect).toString());
            } else {
                arVideo.setAttribute('height', '1');
                arVideo.setAttribute('width', aspect.toString());
            }
        });

        // 底層強制播放函數
        const forcePlay = () => {
            if (video.paused) {
                video.muted = true; 
                
                video.play().catch((err) => {
                    console.log("瀏覽器依然攔截，嘗試透過頁面點擊事件來解鎖", err);
                    document.body.addEventListener('click', () => {
                        video.play();
                    }, { once: true });
                });
            }
        };

        // 當識別到產品時，立刻強制播放
        const targetEntity = document.querySelector('#ar-target');
        targetEntity.addEventListener("targetFound", event => {
            console.log("識別成功，觸發強制播放");
            forcePlay();
        });

        // 失去識別時暫停
        targetEntity.addEventListener("targetLost", event => {
            video.pause();
        });

        // 頁面初次載入時預載入影片
        window.addEventListener('load', () => {
            video.load();
        });
    </script>
</body>
</html>
